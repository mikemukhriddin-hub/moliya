version: '3.8'

services:
  db:
    image: postgres:15
    container_name: antigravity_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: antigravity_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: antigravity_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
